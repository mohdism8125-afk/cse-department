{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-accent" style="font-size: 3rem;"></i>
                <h3 class="text-accent mt-2">NetGuard AI</h3>
                <p class="text-secondary mb-0">Network Security Anomaly Detection</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0" name="username" required placeholder="Enter username" autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0" name="password" required placeholder="Enter password">
                    </div>
                </div>
                <button type="submit" class="btn btn-accent w-100 py-2 mt-2">Login</button>
            </form>
            <div class="text-center mt-3">
                <span class="text-secondary">Don't have an account?</span>
                <a href="/register" class="text-accent text-decoration-none"> Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
