{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-accent" style="font-size: 3rem;"></i>
                <h3 class="text-accent mt-2">Create Account</h3>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" placeholder="Enter your name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required placeholder="Choose a username" autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="Choose a password">
                </div>
                <button type="submit" class="btn btn-accent w-100 py-2 mt-2">Register</button>
            </form>
            <div class="text-center mt-3">
                <span class="text-secondary">Already have an account?</span>
                <a href="/login" class="text-accent text-decoration-none"> Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
