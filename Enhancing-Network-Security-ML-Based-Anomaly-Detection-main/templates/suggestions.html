{% extends "base.html" %}
{% block title %}Mitigations{% endblock %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-lightbulb"></i> Attack Mitigation Strategies</h2>
</div>

<div class="row g-4">
{% for item in suggestions %}
<div class="col-md-6">
    <div class="card h-100" style="border-left: 4px solid {{ item.color }};">
        <div class="card-header d-flex align-items-center">
            <i class="bi bi-{{ item.icon }} me-2" style="color: {{ item.color }}; font-size: 1.3rem;"></i>
            <h5 class="mb-0" style="color: {{ item.color }};">{{ item.attack }}</h5>
        </div>
        <div class="card-body">
            <ul class="list-unstyled mb-0">
                {% for s in item.suggestions %}
                <li class="mb-2">
                    <i class="bi bi-check2-circle text-accent me-1"></i>
                    <span class="text-light">{{ s }}</span>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
{% endfor %}
</div>
{% endblock %}
